<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GymPro</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <h1>GymPro</h1>

  <!-- Dashboard -->
  <div id="dashboard" class="card">
    <h3>🔥 Streak: <span id="streak">0</span> days</h3>
    <h3>🎯 Goal: <span id="goal">0</span> kg</h3>
    <h3>💡 Tip: <span id="tip">Start strong</span></h3>
  </div>

  <!-- Tabs -->
  <div id="home" class="tab active">
    <div id="workouts"></div>
  </div>

  <div id="add" class="tab">
    <div class="card">
      <input id="exercise" placeholder="Exercise">
      <input id="reps" type="number" placeholder="Reps">
      <input id="weight" type="number" placeholder="Weight (kg)">
      <button onclick="addWorkout()">Add Workout</button>
    </div>
  </div>

  <div id="progress" class="tab">
    <div class="card">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="nav">
    <button onclick="showTab('home')">🏠</button>
    <button onclick="showTab('add')">➕</button>
    <button onclick="showTab('progress')">📊</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <p id="totalWorkouts"></p>
    <p id="totalWeight"></p>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
