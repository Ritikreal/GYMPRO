<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymPro | Elite Fitness Tracker</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- GSAP for animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glow-orb"></div>
<div class="glow-orb-2"></div>

<div class="app">
  <h1 class="logo">
    <span class="logo-icon">💪</span>
    Gym<span class="logo-highlight">Pro</span>
  </h1>

  <!-- Dashboard -->
  <div id="dashboard" class="card dashboard-card">
    <div class="dashboard-stats">
      <div class="stat-item">
        <div class="stat-icon">🔥</div>
        <div class="stat-info">
          <span class="stat-label">Streak</span>
          <span class="stat-value" id="streak">0</span>
          <span class="stat-unit">days</span>
        </div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-icon">🎯</div>
        <div class="stat-info">
          <span class="stat-label">Goal</span>
          <span class="stat-value" id="goal">0</span>
          <span class="stat-unit">kg</span>
        </div>
      </div>
    </div>
    <div class="tip-container">
      <div class="tip-icon">💡</div>
      <div class="tip-text" id="tip">Start strong</div>
    </div>
  </div>

  <!-- Tabs -->
  <div id="home" class="tab active">
    <div class="section-header">
      <h2>Workout History</h2>
      <span class="section-badge" id="workoutCount">0</span>
    </div>
    <div id="workouts" class="workouts-list"></div>
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-icon">🏋️</div>
      <p>No workouts yet</p>
      <small>Tap + to add your first workout</small>
    </div>
  </div>

  <div id="add" class="tab">
    <div class="card add-card">
      <h2>Log Workout</h2>
      <div class="input-group">
        <input id="exercise" placeholder="Exercise name" autocomplete="off">
      </div>
      <div class="input-row">
        <div class="input-group">
          <input id="reps" type="number" placeholder="Reps">
        </div>
        <div class="input-group">
          <input id="weight" type="number" placeholder="Weight (kg)" step="0.5">
        </div>
      </div>
      <button class="btn-primary" onclick="addWorkout()">
        <span>➕</span> Add Workout
      </button>
    </div>
  </div>

  <div id="progress" class="tab">
    <div class="card chart-card">
      <div class="chart-header">
        <h2>Progress Tracker</h2>
        <span class="chart-badge">Volume (kg)</span>
      </div>
      <canvas id="chart"></canvas>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="nav">
    <button class="nav-btn" onclick="showTab('home')">
      <span>🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" onclick="showTab('add')">
      <span>➕</span>
      <span class="nav-label">Add</span>
    </button>
    <button class="nav-btn" onclick="showTab('progress')">
      <span>📊</span>
      <span class="nav-label">Stats</span>
    </button>
  </div>

  <!-- Stats Footer -->
  <div class="stats-footer">
    <div class="stat-block">
      <span class="stat-block-value" id="totalWorkouts">0</span>
      <span class="stat-block-label">workouts</span>
    </div>
    <div class="stat-block">
      <span class="stat-block-value" id="totalWeight">0</span>
      <span class="stat-block-label">kg lifted</span>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
